name = "rare-ocaml"
language = "OCaml"
description = "Regular expression / string-based fuzzing workload (OCaml, crowbar + qcheck + afl + base runners)."

mutations = [
  "rare_1",
]

# Only one variant: `rare_1` is a bug in the regex-matching implementation.
# Both spec properties check different invariants about which strings
# should reach the buggy path. Witnesses live in lib/spec.ml implicitly;
# not yet translated into the manifest.

[[tasks]]
mutations = ["rare_1"]
tasks = [
  { property = "NothingPasses" },
  { property = "TightPrecondition" },
]
